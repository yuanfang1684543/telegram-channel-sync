version: '3.8'

services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: telegram-sync-bot
    
    # 重启策略
    restart: unless-stopped
    
    # 环境变量
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      SOURCE_CHANNEL_ID: ${SOURCE_CHANNEL_ID}
      TARGET_CHANNEL_ID: ${TARGET_CHANNEL_ID}
      # CHANNEL_MAPPINGS_JSON: ${CHANNEL_MAPPINGS_JSON}  # 可选
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
